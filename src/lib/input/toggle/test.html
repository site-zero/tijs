<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toggle Test</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        --space: 0.3em;
        --box-width: 4em;
        --box-height: auto;
        --btn-size: 1em;
        --border: 1px;

        font-size: 16px;
        --color-on: #08f;
        --color-on-bg: #eee;
        --color-off: #888;
        --color-off-bg: #ddd;
      }
      .container {
        padding: 20px;
        background-color: #ddd;
        margin: 0 auto;
        border-radius: 8px;
        width: 500px;
        height: 500px;
      }

      aside {
        display: flex;
        justify-content: flex-start;
        align-items: center;
        align-content: center;
        flex-wrap: nowrap;
        width: var(--box-width);
        height: var(--box-height);
        padding: var(--space);
        border-radius: 2em;
        border-width: var(--border);
        border-style: solid;
        cursor: pointer;
        transition: 0.3s;

        background-color: var(--color-on-bg);
        border: var(--border) solid var(--color-on);

        overflow: visible;
      }

      b {
        display: flex;
        justify-content: center;
        align-items: center;
        align-content: center;
        flex-wrap: wrap;
        position: relative;
        border-radius: 50%;
        width: var(--btn-size);
        height: var(--btn-size);
        line-height: var(--btn-size);
        transition: 0.3s;
        color: var(--color-on-bg);
        background-color: var(--color-on);
        border-color: var(--color-on);
        transform: translateX(var(--on-left));
      }
    </style>
  </head>
  <body>
    <div class="container">
      <aside>
        <b></b>
      </aside>
    </div>
  </body>
</html>
